# 1. Create a Service Account for the Jenkins agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-deployer
  namespace: jenkins
---
# 2. Define the permissions needed to deploy ShopFlow
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shopflow-deployer-role
  namespace: default
rules:
- apiGroups: ["", "apps"]
  resources: ["deployments", "services", "pods"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# 3. Bind the Service Account to the Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shopflow-deployer-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: jenkins-deployer
  namespace: jenkins
roleRef:
  kind: Role
  name: shopflow-deployer-role
  apiGroup: rbac.authorization.k8s.io
