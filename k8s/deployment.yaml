apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopflow

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopflow

  template:
    metadata:
      labels:
        app: shopflow

    spec:
      containers:
      - name: shopflow

        image: shopflow:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5001

        env:
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: shopflow-secret
              key: SUPABASE_URL

        - name: SUPABASE_KEY
          valueFrom:
            secretKeyRef:
              name: shopflow-secret
              key: SUPABASE_KEY

        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 3